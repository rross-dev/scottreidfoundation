<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f0f0ff">
    
    <title>Photo Archive | The Scott Reid Foundation</title>
    <meta name="description" content="Browse past Scott Reid Foundation Charity Golf Tournament photos and memories.">

    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon2.png">

    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-icon.png">

    <meta property="og:image" content="images/og-image.jpg">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="stylesheet" href="styles.css">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="main.js"></script>
  </head>

  <body>

    <div id="loading"></div>

    <div id="content" style="display: none;"></div>

    <!-- HEADER (same as homepage for consistency) -->
    <header>
      <nav>

        <ul class="nav-menu-og">
          <li><a href="index.html#home">HOME</a></li>
          <li><a href="index.html#registration">REGISTRATION</a></li>
          <li><a href="index.html#about">ABOUT</a></li>
          <li><a href="index.html#contact">CONTACT</a></li>
          <li><a href="archive.html">PHOTO ARCHIVE</a></li>

        </ul>

        <div class="logo-container">
          <div class="logo-content">
            <div class="text-container">
              <h1>The Scott Reid Foundation</h1>
            </div>
            <img src="images/apple-icon.png">
          </div>
        </div>

        <div class="hamburger">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </div>

        <ul class="nav-menu">
          <div class="nav-menu-text">
            <li class="nav-item"><a href="index.html#home">HOME</a></li>
            <li class="nav-item"><a href="index.html#registration">REGISTRATION</a></li>
            <li class="nav-item"><a href="index.html#about">ABOUT</a></li>
            <li class="nav-item"><a href="index.html#contact">CONTACT</a></li>
            <li class="nav-item"><a href="archive.html">PHOTO ARCHIVE</a></li>

          </div>
        </ul>

      </nav>
    </header>

    <main>

      <!-- ARCHIVE SECTION -->
      <section class="archive">

        <div class="archive-header">
          <h1>Photo Archive</h1>
          <p>
            Browse memories from past Scott Reid Foundation Memorial Golf Tournaments.
          </p>
        </div>

        <!-- GOOGLE PHOTOS EMBED -->
        <div class="archive-gallery">

          <iframe
            src="https://photos.app.goo.gl/5inhqLNDLT3Ho3ZP9"
            style="width:100%; height:800px; border:0; border-radius:12px;"
            loading="lazy">
          </iframe>

        </div>

      </section>

    </main>

  </body>

  <style>
    .archive {
      padding: 60px 20px;
      max-width: 1200px;
      margin: 0 auto;
      text-align: center;
    }

    .archive-header h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    .archive-header p {
      font-size: 1rem;
      opacity: 0.8;
      margin-bottom: 30px;
    }

    .archive-gallery iframe {
      width: 100%;
      height: 800px;
      border: none;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    /* Mobile adjustment */
    @media (max-width: 768px) {
      .archive-gallery iframe {
        height: 500px;
      }
    }
  </style>

  <script src="hamburger.js"></script>
  <script src="main.js"></script>

</html>
